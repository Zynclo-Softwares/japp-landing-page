    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Which job boards does Just Apply support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Just Apply works on virtually any job board or career site — LinkedIn, Indeed, Greenhouse, Lever, Workday, and any company's own application portal. The agent fills forms wherever you point it."
          }
        },
        {
          "@type": "Question",
          "name": "Can I choose which AI model is used?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Just Apply uses leading frontier models and lets you switch between them depending on your needs and the complexity of the application."
          }
        },
        {
          "@type": "Question",
          "name": "How does Just Apply protect my privacy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your profile, resume content, and application history are private. We never sell your data, and applications are only submitted with your explicit approval in human-in-the-loop mode."
          }
        },
        {
          "@type": "Question",
          "name": "How is Just Apply different from other auto-apply tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most tools spam applications. Just Apply researches each company, tailors your resume and cover letter to the role using your own template, and keeps you in control with review steps — quality over quantity, at 20× speed."
          }
        },
        {
          "@type": "Question",
          "name": "When does the public beta launch?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Just Apply is currently in private beta with rolling access. Join the waitlist to be notified when your spot opens up."
          }
        }
      ]
    }
    </script>
